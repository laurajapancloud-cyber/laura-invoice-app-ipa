name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build App
        run: |
          xcodebuild build \
            -project LauraInvoice.xcodeproj \
            -scheme LauraInvoice \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/Release-iphoneos/LauraInvoice.app Payload/
          zip -r LauraInvoice.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: LauraInvoice-IPA
          path: LauraInvoice.ipa
