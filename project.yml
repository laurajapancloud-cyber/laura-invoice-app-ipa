name: LauraInvoice
options:
  bundleIdPrefix: com.laura
targets:
  LauraInvoice:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources: [LauraInvoice]
    settings:
      MARKETING_VERSION: 1.0.0
      CURRENT_PROJECT_VERSION: 1
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGN_IDENTITY: ""
      PROVISIONING_PROFILE_SPECIFIER: ""
      GENERATE_INFOPLIST_FILE: YES
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
      INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
      INFOPLIST_KEY_NSCameraUsageDescription: "領収書の撮影やスキャンのためにカメラを使用します。"
      INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "領収書の画像を選択するために写真ライブラリを使用します。"
      INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "生成した請求書を保存するためにライブラリを使用します。"
